<!doctype html>
<html lang="en">
  <body>
    <form id="form">
      <div id="combo" data-rui-combobox>
        <input data-rui-input aria-label="Search">
        <input data-rui-value type="hidden">
        <div data-rui-popup>
          <div data-rui-option id="one">One</div>
          <div data-rui-option id="two">Two</div>
        </div>
      </div>
    </form>
    <div id="tabs" data-rui-tabs>
      <button data-rui-tab data-rui-panel="panel-one">First</button>
      <button data-rui-tab data-rui-panel="panel-two">Second</button>
    </div>
    <div id="panel-one"></div><div id="panel-two"></div>
    <button data-rui-dialog-trigger="dialog">Open dialog</button>
    <div id="dialog" data-rui-dialog><button data-rui-dialog-close>Close</button><button>Action</button></div>
    <div id="palette" data-rui-command-palette>
      <input data-rui-input aria-label="Command">
      <div data-rui-popup><button data-rui-command data-value="settings">Settings</button></div>
    </div>
    <select id="select" data-rui-select><option value="a">A</option><option value="b">B</option></select>
    <div id="listbox" data-rui-listbox tabindex="0"><button data-rui-option id="l-one">One</button><button data-rui-option id="l-two">Two</button></div>
    <div id="menu" data-rui-menu tabindex="0"><button data-rui-menuitem id="m-one">Menu one</button><button data-rui-menuitem id="m-two">Menu two</button></div>
    <button data-rui-popover-trigger="popover">Open popover</button><div id="popover" data-rui-popover tabindex="0">Popover</div>
    <div id="radio" data-rui-radio-group><button data-rui-radio>One</button><button data-rui-radio>Two</button></div>
    <div id="toggle" data-rui-toggle-group><button data-rui-toggle>Bold</button><button data-rui-toggle>Italic</button></div>
    <div id="tree" data-rui-tree><button data-rui-treeitem>Root</button><button data-rui-treeitem data-parent="tree-0">Child</button></div>
    <div id="accordion" data-rui-accordion><section id="acc-one" data-rui-accordion-item><button data-rui-accordion-trigger>Section</button><div data-rui-accordion-content>Content</div></section></div>
    <button id="switch" data-rui-switch>Switch</button>
    <button id="checkbox" data-rui-checkbox>Accept</button>
    <div id="checkbox-group" data-rui-checkbox-group><button data-rui-checkbox>One</button><button data-rui-checkbox>Two</button></div>
    <div id="slider" data-rui-slider data-min="0" data-max="100" data-value="20"></div>
    <div id="range-slider" data-rui-range-slider data-value-start="20" data-value-end="80"><button data-rui-slider-thumb></button><button data-rui-slider-thumb></button></div>
    <button data-rui-tooltip-trigger="help">Help</button><div id="tooltip" data-rui-tooltip data-rui-tooltip-trigger="help">Helpful text</div>
    <div id="menubar" data-rui-menubar tabindex="0"><div data-rui-menu><button data-rui-menuitem>File</button></div><div data-rui-menu><button data-rui-menuitem>Edit</button></div></div>
    <div id="context-menu" data-rui-context-menu><div data-rui-menu><button data-rui-menuitem>Copy</button></div></div>
    <script type="module">
      import { bindCombobox, bindTabs, bindDialog, bindCommandPalette, bindSelect, bindListbox, bindMenu, bindPopover, bindRadioGroup, bindToggleGroup, bindTreeView, bindAccordion, bindSwitch, bindCheckbox, bindCheckboxGroup, bindSlider, bindRangeSlider, bindTooltip, bindMenubar, bindContextMenu } from "/dist/src/index.js";
      window.bindCombobox = bindCombobox;
      window.bindTabs = bindTabs;
      window.bindDialog = bindDialog;
      window.bindCommandPalette = bindCommandPalette;
      window.bindSelect = bindSelect; window.bindListbox = bindListbox; window.bindMenu = bindMenu; window.bindPopover = bindPopover;
      window.bindRadioGroup = bindRadioGroup; window.bindToggleGroup = bindToggleGroup; window.bindTreeView = bindTreeView; window.bindAccordion = bindAccordion; window.bindSwitch = bindSwitch;
      window.bindCheckbox = bindCheckbox; window.bindCheckboxGroup = bindCheckboxGroup; window.bindSlider = bindSlider; window.bindRangeSlider = bindRangeSlider; window.bindTooltip = bindTooltip; window.bindMenubar = bindMenubar; window.bindContextMenu = bindContextMenu;
    </script>
  </body>
</html>
